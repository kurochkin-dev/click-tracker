# Ingress — точка входа в кластер для HTTP трафика
#
# Требует установленного ingress-controller, например:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: click-tracker-ingress
  namespace: click-tracker
  labels:
    app.kubernetes.io/name: click-tracker
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    # Раскомментируйте для TLS через cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: click-tracker.example.com  # Замените на ваш домен
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
  # Раскомментируйте для TLS:
  # tls:
  #   - hosts:
  #       - click-tracker.example.com
  #     secretName: click-tracker-tls
