apiVersion: v1
kind: Secret
metadata:
  name: click-tracker-secret
  namespace: click-tracker
  labels:
    app.kubernetes.io/name: click-tracker
type: Opaque
# Значения закодированы в base64:
#   echo -n 'yourvalue' | base64
#
# ВНИМАНИЕ: замените значения на реальные перед деплоем!
# Для production используйте Sealed Secrets, Vault или внешний secrets manager.
stringData:
  MYSQL_ROOT_PASSWORD: "change-me-root"
  MYSQL_DATABASE: "clicktracker"
  MYSQL_USER: "click"
  MYSQL_PASSWORD: "change-me-pass"
  MONGO_INITDB_ROOT_USERNAME: "root"
  MONGO_INITDB_ROOT_PASSWORD: "change-me-mongo"
