# nginx Deployment + Service (LoadBalancer)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: click-tracker
  labels:
    app.kubernetes.io/name: click-tracker
    app.kubernetes.io/component: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/component: nginx
    spec:
      containers:
        - name: nginx
          # Замените image на ваш registry:
          # image: registry.example.com/click-tracker/nginx:latest
          image: click-tracker-nginx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: click-tracker
  labels:
    app.kubernetes.io/component: nginx
spec:
  selector:
    app: nginx
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
